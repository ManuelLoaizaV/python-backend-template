services:
  backend:
    build: .
    env_file: ".env"
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
      postgres-test:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  postgres:
    image: postgres:18.3-alpine
    env_file: ".env"
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql

  postgres-test:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    tmpfs:
      - /var/lib/postgresql

volumes:
  postgres_data:
