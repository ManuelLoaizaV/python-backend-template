services:
  backend:
    build: .
    env_file: ".env"
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  postgres:
    image: postgres:18.3-alpine
    env_file: ".env"
    ports:
      - 5432:5432
    healthcheck:
          test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
